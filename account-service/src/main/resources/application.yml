spring:
  application:
    name: account-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bankdb}
    username: ${SPRING_DATASOURCE_USERNAME:bankuser}
    password: ${SPRING_DATASOURCE_PASSWORD:bankpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration


server:
  port: 8080

springdoc:
  swagger-ui:
    operations-sorter: alpha

jwt:
  secret: ${JWT_SECRET:bXlWZXJ5U2VjcmV0S2V5VGhhdFNob3VsZEJlQXRMZWFzdDI1NkJpdHNMb25nRm9ySFMyNTY=}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}